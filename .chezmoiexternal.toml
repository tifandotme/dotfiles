# chezmoi:template:left-delimiter="# {{" right-delimiter=}}

[".vim/autoload/plug.vim"]
type = "file"
url = "https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim"
refreshPeriod = "168h"

# {{ if eq .chezmoi.os "darwin" -}}

[".config/nushell/scripts/external/topiary-nushell"]
type = "git-repo"
url = "git@github.com:blindFS/topiary-nushell.git"
refreshPeriod = "168h"
[".config/nushell/scripts/external/topiary-nushell"."pull"]
args = ["--rebase", "--autostash"]

[".config/nushell/scripts/external/bash-env-nushell"]
type = "git-repo"
url = "git@github.com:tesujimath/bash-env-nushell.git"
refreshPeriod = "168h"
[".config/nushell/scripts/external/bash-env-nushell"."pull"]
args = ["--rebase", "--autostash"]

# {{- end -}}

# {{ if eq .chezmoi.hostname "box" -}}

# only vps uses zellij
[".config/zellij/zjstatus.wasm"]
type = "file"
url = "https://github.com/dj95/zjstatus/releases/download/v0.23.0/zjstatus.wasm"

# {{- end -}}
