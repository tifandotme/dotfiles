# default: https://github.com/sxyazi/yazi/blob/main/yazi-config/preset/README.md

#:schema https://yazi-rs.github.io/schemas/yazi.json

[plugin]
append_fetchers = [
  { id = "chezmoi", url = "*/", run = "chezmoi", prio = "low", group = "chezmoi" },
  { id = "chezmoi", url = "local://*", run = "chezmoi", prio = "low", group = "chezmoi" },
]
prepend_previewers = [
  { url = "*.csv", run = 'piper -- tv -a -f "$1"' },
]
# Disable image/video/PDF previews to avoid chafa escape sequence leak triggering rename
# prepend_previewers = [
# { mime = "image/*", run = "noop" },
# { mime = "video/*", run = "noop" },
# { mime = "application/pdf", run = "noop" },
# ]

[mgr]
ratio = [0, 3, 3]
show_hidden = true
# sort_by = "extension"       # might be overridden by folder-rules.yazi
# linemode = "size_and_mtime" # might be overridden by folder-rules.yazi
# show_symlink = false

[open]
prepend_rules = [
  { url = "*.{html,htm,webarchive,url,svg,xml,xhtml}", use = ["open", "edit"] },
  { url = "*.{pdf,doc,docx,pages,numbers,key,xls,xlsx,ppt,pptx}", use = "open" },
  { url = "*.csv", use = "view_csv" },
  { mime = "text/*", use = "edit" },
  { mime = "video/*", use = "play" },
]

[opener]
play = [{ run = 'open "$@" -a IINA', orphan = true, for = "unix" }]
view_csv = [
  { run = 'tv -a -f -e "$1" | bat --plain --paging=always --wrap=never', block = true, for = "unix" }
]
# Yazi sets TERM to a value Neovim does not recognize, but ansi lacks cursor shape controls.
edit = [{ run = 'TERM=xterm-ghostty $EDITOR "$@"', block = true, for = "unix" }]

[preview]
max_width = 1200
image_quality = 50
image_delay = 100
