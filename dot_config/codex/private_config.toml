#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.5"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "disabled"
approvals_reviewer = "guardian_subagent"
notify = [
  "bash",
  "-lc",
  'exec "${CODEX_HOME:-${XDG_CONFIG_HOME:-$HOME/.config}/codex}/cmux-notify.sh"',
]

# [features]
# codex_hooks = true

[projects."/Users/tifan/.local/share/chezmoi"]
trust_level = "trusted"

[projects."/Users/tifan/personal/resume"]
trust_level = "trusted"

[projects."/Users/tifan/personal/notes"]
trust_level = "trusted"

[projects."/Users/tifan/work/hadl/aquasense-app"]
trust_level = "trusted"

[projects."/Users/tifan/work/hadl/aquasense-service"]
trust_level = "trusted"

[projects."/Users/tifan/work/hadl/backoffice-windmill"]
trust_level = "trusted"

[projects."/Users/tifan/work/hadl/gcp-terraform"]
trust_level = "trusted"

[projects."/Users/tifan/work/hadl"]
trust_level = "trusted"

[projects."/Users/tifan/personal/hevy"]
trust_level = "trusted"

[tui]
theme = "ansi"
status_line = [
  "model-with-reasoning",
  "current-dir",
  "git-branch",
  "context-used",
  "five-hour-limit",
  "weekly-limit",
]
notifications = true
notification_method = "auto"
show_tooltips = false
