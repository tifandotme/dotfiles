[settings]
animate = false
animation_duration = 0.2
animation_fps = 100.0
default_disable = false
focus_follows_mouse = false
mouse_follows_focus = false
mouse_hides_on_focus = false
auto_focus_blacklist = ["com.raycast.macos"]
run_on_start = [
  "sketchybar",
  "borders",
  "osascript /Users/tifan/.config/rift/applescripts/wifi_off_on.applescript",
  "rift-cli subscribe cli --event workspace_changed --command sh --args -c --args 'sketchybar --trigger rift_workspace_changed RIFT_WORKSPACE_NAME=\"$RIFT_WORKSPACE_NAME\" RIFT_WORKSPACE_ID=\"$RIFT_WORKSPACE_ID\"'",
]
hot_reload = true

[settings.layout]
mode = "traditional"

[settings.layout.master_stack]
master_ratio = 0.6
master_count = 1
master_side = "left"
new_window_placement = "master"

[settings.layout.scrolling]
column_width_ratio = 0.7
min_column_width_ratio = 0.3
max_column_width_ratio = 0.9
alignment = "center"
focus_navigation_style = "niri"

[settings.layout.scrolling.gestures]
enabled = false
invert_horizontal = false
fingers = 3
propagate_to_workspace_swipe = false

[settings.layout.stack]
stack_offset = 30.0
default_orientation = "horizontal"

[settings.layout.gaps.outer]
top = 30
left = 7
bottom = 7
right = 7

[settings.layout.gaps.inner]
horizontal = 7
vertical = 7

[settings.ui.menu_bar]
enabled = false
show_empty = false
mode = "all"
active_label = "index"
display_style = "layout"

[settings.ui.stack_line]
enabled = false
horiz_placement = "top"
vert_placement = "left"
thickness = 20.0
spacing = 1.0

[settings.ui.mission_control]
enabled = false
fade_enabled = false
fade_duration_ms = 180.0

[settings.gestures]
enabled = false
consume_dock_swipe = true
invert_horizontal_swipe = false
swipe_vertical_tolerance = 0.4
skip_empty = true
fingers = 3
distance_pct = 0.08
haptics_enabled = true
haptic_pattern = "level_change"

[settings.window_snapping]
drag_swap_fraction = 0.3

[virtual_workspaces]
enabled = true
default_workspace_count = 6
auto_assign_windows = true
preserve_focus_per_workspace = true
workspace_auto_back_and_forth = false
reapply_app_rules_on_title_change = false
default_workspace = 1
workspace_names = [
  "0_misc",
  "1_personal",
  "2_work",
  "3_editor",
  "4_terminal",
  "5_notes",
]
workspace_rules = []
app_rules = [
  { app_id = "net.whatsapp.WhatsApp", workspace = "0_misc" },
  { app_id = "ru.keepcoder.Telegram", workspace = "0_misc" },
  { app_id = "com.hnc.Discord", workspace = "0_misc" },
  { app_id = "com.colliderli.iina", workspace = "0_misc" },
  { app_id = "com.tinyspeck.slackmacgap", workspace = "0_misc" },
  { app_id = "com.spotify.client", workspace = "0_misc" },
  { app_id = "net.imput.helium", workspace = "1_personal" },
  { app_id = "net.imput.helium.debug", workspace = "1_personal" },
  { app_id = "com.apple.Safari", workspace = "1_personal" },
  { app_id = "org.chromium.Chromium", workspace = "1_personal" },
  { app_id = "com.github.Electron", workspace = "2_work" },
  { app_id = "com.utmapp.UTM", workspace = "2_work" },
  { app_id = "com.postmanlabs.mac", workspace = "2_work" },
  { app_id = "dev.zed.Zed", workspace = "3_editor" },
  { app_id = "com.todesktop.230313mzl4w4u92", workspace = "3_editor" },
  { app_id = "com.anthropic.claudefordesktop", workspace = "3_editor" },
  { app_id = "com.mitchellh.ghostty", workspace = "4_terminal" },
  { app_id = "com.apple.Terminal", workspace = "4_terminal" },
  { app_id = "md.obsidian", workspace = "5_notes" },
  { app_id = "club.refactoring.tolaria", workspace = "5_notes" },
]

[modifier_combinations]
cmd_shift = "Meta + Shift"
alt_shift = "Alt + Shift"

[keys]
"Alt + Enter" = "toggle_window_floating"
"Alt + Period" = "toggle_orientation"
"Alt + Comma" = "toggle_stack"

"Alt + Shift + H" = { move_focus = "left" }
"Alt + Shift + J" = { move_focus = "down" }
"Alt + Shift + K" = { move_focus = "up" }
"Alt + Shift + L" = { move_focus = "right" }
"Alt + Shift + F" = "toggle_fullscreen_within_gaps"
"Alt + Shift + Minus" = "resize_window_shrink"
"Alt + Shift + Equal" = "resize_window_grow"

"Meta + Backquote" = { switch_to_workspace = 0 }
"Meta + 1" = { switch_to_workspace = 1 }
"Meta + 2" = { switch_to_workspace = 2 }
"Meta + 3" = { switch_to_workspace = 3 }
"Meta + 4" = { switch_to_workspace = 4 }
"Meta + 5" = { switch_to_workspace = 5 }

"Meta + Shift + Backquote" = { move_window_to_workspace = 0 }
"Meta + Shift + 1" = { move_window_to_workspace = 1 }
"Meta + Shift + 2" = { move_window_to_workspace = 2 }
"Meta + Shift + 3" = { move_window_to_workspace = 3 }
"Meta + Shift + 4" = { move_window_to_workspace = 4 }
"Meta + Shift + 5" = { move_window_to_workspace = 5 }

"Alt + H" = { move_node = "left" }
"Alt + J" = { move_node = "down" }
"Alt + K" = { move_node = "up" }
"Alt + L" = { move_node = "right" }
"Alt + Shift + Left" = { join_window = "left" }
"Alt + Shift + Down" = { join_window = "down" }
"Alt + Shift + Up" = { join_window = "up" }
"Alt + Shift + Right" = { join_window = "right" }
